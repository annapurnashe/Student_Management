<div class="form-container">
  <div class="card">
    <h2>{{ isEdit ? '✏️ Edit Student' : '➕ Add New Student' }}</h2>
    
    <div class="error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" [(ngModel)]="student.first_name" name="firstName" required>
      </div>

      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" [(ngModel)]="student.last_name" name="lastName" required>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" [(ngModel)]="student.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Roll Number *</label>
        <input type="text" [(ngModel)]="student.roll_number" name="rollNumber" required>
      </div>

      <div class="form-group">
        <label>Course *</label>
        <input type="text" [(ngModel)]="student.course" name="course" required>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Saving...' : (isEdit ? 'Update Student' : 'Create Student') }}
        </button>
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
